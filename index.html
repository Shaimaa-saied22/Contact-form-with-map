<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact form with map</title>
    <link rel="stylesheet" href="form.css">
    <!-- fontawesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <mai id="main">
        <div class="contact-us">
            <div class="content">
                <h2>Contact Us</h2>
                <p>free free to reach out for any inquries or feedback. We are here to help!</p>
                <form>
                    <input type="text" name="Name" id="name" placeholder="Your Name">
                    <input type="email" name="Email" id="email" placeholder="Your Email">
                    <textarea name="message" id="message" placeholder="Your Message" rows="6"></textarea>
                    <button type="submit" class="btn-submit">Send Message</button>
                </form>
                <div class="social">
                    <a href="#"><i class="fa-brands fa-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#"><i class="fa-brands fa-google"></i></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></i></a>
                </div>

            </div>

            <div class="map">
<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7292349.375640106!2d36.17368546005475!3d26.817123361222603!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14368976c35c36e9%3A0x2c45a00925c4c444!2z2YXYtdix!5e0!3m2!1sar!2seg!4v1777934011294!5m2!1sar!2seg" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>            </div>

        </div>
    </main>

    
</body>
</html>
